name: PR Build Check
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    # PostgreSQL service container for SSG during build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: build_user
          POSTGRES_PASSWORD: build_password
          POSTGRES_DB: nomad_build
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint (Biome)
        run: pnpm turbo run lint

      - name: Setup build database
        run: pnpm web:db:push
        env:
          DATABASE_URL: postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL: "false"

      - name: Seed build database
        run: pnpm web:db:seed
        env:
          DATABASE_URL: postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL: "false"

      - name: Create .env.local for build
        run: |
          cat > apps/web/.env.local << 'EOF'
          DATABASE_URL=postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL=false
          BETTER_AUTH_SECRET=dummy-secret-for-build-only
          BETTER_AUTH_URL=http://localhost:3000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=1x00000000000000000000AA
          TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
          EOF

      - name: Run build
        run: pnpm turbo run build
        env:
          # Disable Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build status
        if: success()
        run: echo "Build completed successfully!"

      - name: Build failed
        if: failure()
        run: echo "Build failed! Please fix the issues before merging."
