name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ========================================
  # Parallel Jobs: Build & Tests
  # ========================================

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build --experimental-build-mode compile
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?sslmode=disable"
          DATABASE_SSL: "false"
          BETTER_AUTH_SECRET: "dummy-secret-for-build-only"
          BETTER_AUTH_URL: "http://localhost:3000"

      - name: Build status
        if: success()
        run: echo "✅ Build completed successfully!"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Run unit tests
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/tmp/
          retention-days: 30

  playwright-tests:
    name: Playwright E2E (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 30

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook
        env:
          NODE_ENV: production

      - name: Run Storybook accessibility tests
        run: pnpm test:run --project=storybook
        continue-on-error: true

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 30

      - name: Build status
        if: success()
        run: echo "✅ Storybook built successfully!"

  # ========================================
  # Merge Playwright Reports
  # ========================================

  merge-playwright-reports:
    name: Merge Playwright Reports
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-*

      - name: Merge reports
        run: |
          echo "📊 Merging Playwright reports..."
          ls -la all-reports/
          ls -la all-reports/*/

          mkdir -p blob-reports
          find all-reports -name "*.zip" -exec cp {} blob-reports/ \; || true
          find all-reports -name "*.jsonl" -exec cp {} blob-reports/ \; || true

          ls -la blob-reports/

          if [ "$(ls -A blob-reports/)" ]; then
            pnpm exec playwright merge-reports --reporter=html blob-reports
            echo "✅ Reports merged successfully"
          else
            echo "⚠️ No blob reports found, creating empty report"
            mkdir -p playwright-report
            echo "<html><body><h1>No test reports available</h1></body></html>" > playwright-report/index.html
          fi

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

  # ========================================
  # Deploy Test Reports / Storybook - Optional
  # ========================================
  deploy:
    name: Deploy to GitHub Pages
    # Deploy to GitHub Pages:
    # If push to main, deploy to username.github.io/repo/
    # If push to develop, deploy to username.github.io/repo/develop
    if: ${{ !cancelled() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')}}
    needs: [unit-tests, merge-playwright-reports, storybook]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages-production' || 'github-pages-develop' }}
      url: ${{ steps.set-url.outputs.page_url }}
    outputs:
      page_url: ${{ steps.set-url.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./public/coverage/

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-merged
          path: ./public/playwright-report/

      - name: Download Storybook
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: ./public/storybook/

      - name: Generate test dashboard
        run: |
          echo "📊 Generating dashboard..."
          node scripts/generate-dashboard.js
          echo "✅ Dashboard generated successfully"
          echo "=== Final public directory structure ==="
          ls -la public/
          echo "=== Storybook files ==="
          ls -la public/storybook/ | head -10
          echo "=== Playwright report files ==="
          ls -la public/playwright-report/ | head -10
          echo "=== Coverage files ==="
          ls -la public/coverage/ | head -10
        env:
          BASE_PATH: ${{ github.ref == 'refs/heads/main' && '' || '/nomad/develop' }}

      - name: Set deployment path and URL
        id: set-path
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "deploy_path=." >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: ROOT (production)"
          else
            echo "deploy_path=develop" >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/develop/" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: /develop (staging)"
          fi

      - name: Deploy to GitHub Pages
        # Here we use peaceiris/actions-gh-pages because official actions/deploy-pages and actions/configure-pages does not support setting custom destination_dir which we need for our branch-specific deployment.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ steps.set-path.outputs.deploy_path }}
          keep_files: true # Keep other files to avoid overwriting
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: ${{ github.event.head_commit.message }}

      - name: Set URL output
        id: set-url
        run: |
          echo "page_url=${{ steps.set-path.outputs.page_url }}" >> $GITHUB_OUTPUT

      - name: Deployment notification
        if: success()
        run: |
          echo "🎉 Successfully deployed!"
          echo "📍 URL: ${{ steps.set-path.outputs.page_url }}"
          echo "🌿 Branch: ${{ github.ref_name }}"

  # ========================================
  # Comment on PR
  # ========================================

  comment-pr:
    name: Comment on PR
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs: [unit-tests, merge-playwright-reports, storybook]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.base_ref }}" == "main" ]; then
            echo "env_name=Production" >> $GITHUB_OUTPUT
            echo "will_deploy=true" >> $GITHUB_OUTPUT
            echo "deploy_url=https://ukesjtu.github.io/nomad/" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" == "develop" ]; then
            echo "env_name=Development (Staging)" >> $GITHUB_OUTPUT
            echo "will_deploy=true" >> $GITHUB_OUTPUT
            echo "deploy_url=https://ukesjtu.github.io/nomad/develop/" >> $GITHUB_OUTPUT
          else
            echo "env_name=Unknown" >> $GITHUB_OUTPUT
            echo "will_deploy=false" >> $GITHUB_OUTPUT
            echo "deploy_url=N/A" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with artifact links
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## 📊 Test Reports & Artifacts

            All tests have been completed! Test reports are available as workflow artifacts.

            ### **Download Artifacts**
            - 📚 **[Storybook Build](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Component library documentation
            - 🎭 **[Playwright E2E Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - End-to-end test results
            - 📈 **[Unit Test Coverage](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Code coverage report

            ### **Test Status**
            - ✅ **Build Check**: Passed
            - ✅ **Unit Tests**: Passed
            - ✅ **E2E Tests**: Passed
            - ✅ **Storybook**: Built successfully

            ### **Deployment Info**
            - **Target Branch**: `${{ github.base_ref }}`
            - **Environment**: ${{ steps.env.outputs.env_name }}
            - **Will Deploy**: ${{ steps.env.outputs.will_deploy == 'true' && '✅ Yes (after merge)' || '❌ No (artifacts only)' }}
            ${{ steps.env.outputs.will_deploy == 'true' && format('- **Deployment URL**: {0}', steps.env.outputs.deploy_url) || '' }}

            ### **Quick Stats**
            - **Workflow Run**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Commit**: [`${{ github.event.pull_request.head.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})
            - **Source Branch**: `${{ github.head_ref }}`

            ---

            ${{ steps.env.outputs.will_deploy == 'true' && format('🚀 **This PR will deploy to {0} after merging to {1}**', steps.env.outputs.env_name, github.base_ref) || '📦 **Artifacts are ready for review. No deployment will occur.**' }}
