name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint (Biome)
        run: pnpm turbo lint

  # ========================================
  # Parallel Jobs: Build & Tests
  # ========================================

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    # PostgreSQL service container for SSG during build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: build_user
          POSTGRES_PASSWORD: build_password
          POSTGRES_DB: nomad_build
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup build database
        run: pnpm web:db:push
        env:
          DATABASE_URL: postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL: "false"

      - name: Seed build database
        run: pnpm web:db:seed
        env:
          DATABASE_URL: postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL: "false"

      - name: Create .env.local for build
        run: |
          cat > apps/web/.env.local << 'EOF'
          DATABASE_URL=postgresql://build_user:build_password@localhost:5432/nomad_build
          DATABASE_SSL=false
          BETTER_AUTH_SECRET=dummy-secret-for-build-only
          BETTER_AUTH_URL=http://localhost:3000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=1x00000000000000000000AA
          TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
          EOF

      - name: Run build
        run: pnpm turbo build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build status
        if: success()
        run: echo "✅ Build completed successfully!"

  vitest-tests:
    name: Vitest Tests (Unit + Integration + Storybook)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nomad_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps

      - name: Setup test database
        run: pnpm --filter web db:push:test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/nomad_test
          DATABASE_SSL: "false"

      - name: Run vitest tests with coverage
        run: pnpm --filter web test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/nomad_test
          DATABASE_SSL: "false"
          BETTER_AUTH_SECRET: "test-secret-for-ci-vitest"
          BETTER_AUTH_URL: "http://localhost:3000"
          ENABLE_ALIYUN_SMS: "false"
          LOG_LEVEL: "silent"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./apps/web/coverage/lcov.info
          flags: vitest
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            apps/web/coverage/
            !apps/web/coverage/tmp/
          retention-days: 30

  playwright-tests:
    name: Playwright E2E (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps

      - name: Run Playwright tests
        working-directory: ./apps/web
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 30

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm web:build-storybook
        env:
          NODE_ENV: production

      - name: Run Storybook accessibility tests
        run: pnpm web:test:run --project=storybook
        continue-on-error: true

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/web/storybook-static/
          retention-days: 30

      - name: Build status
        if: success()
        run: echo "✅ Storybook built successfully!"

  # ========================================
  # Merge Playwright Reports
  # ========================================

  merge-playwright-reports:
    name: Merge Playwright Reports
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-*

      - name: Merge reports
        working-directory: ./apps/web
        run: |
          echo "📊 Merging Playwright reports..."
          ls -la ../../all-reports/
          ls -la ../../all-reports/*/

          mkdir -p blob-reports
          find ../../all-reports -name "*.zip" -exec cp {} blob-reports/ \; || true
          find ../../all-reports -name "*.jsonl" -exec cp {} blob-reports/ \; || true

          ls -la blob-reports/

          if [ "$(ls -A blob-reports/)" ]; then
            npx playwright merge-reports --reporter=html blob-reports
            echo "✅ Reports merged successfully"
          else
            echo "⚠️ No blob reports found, creating empty report"
            mkdir -p playwright-report
            echo "<html><body><h1>No test reports available</h1></body></html>" > playwright-report/index.html
          fi

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: apps/web/playwright-report/
          retention-days: 30

  # ========================================
  # Deploy Test Reports / Storybook - Optional
  # ========================================
  deploy:
    name: Deploy to GitHub Pages
    # Deploy to GitHub Pages:
    # - Push to main → username.github.io/repo/
    # - Push to develop → username.github.io/repo/develop/
    # - PR to develop → username.github.io/repo/preview/pr-{number}-{branch}/
    if: |
      !cancelled() && (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')) ||
        (github.event_name == 'pull_request' && github.base_ref == 'develop' && github.head_ref != 'main')
      )
    needs: [vitest-tests, merge-playwright-reports, storybook]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'github-pages-production' || 'github-pages-develop') || 'github-pages-preview' }}
      url: ${{ steps.set-url.outputs.page_url }}
    outputs:
      page_url: ${{ steps.set-url.outputs.page_url }}
      is_preview: ${{ steps.set-path.outputs.is_preview }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./apps/web/public/coverage/

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-merged
          path: ./apps/web/public/playwright-report/

      - name: Download Storybook
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: ./apps/web/public/storybook/

      - name: Set deployment path and URL
        id: set-path
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR Preview deployment
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH_NAME="${{ github.head_ref }}"
            # Sanitize branch name: replace / with -, limit length to 50 chars
            SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | cut -c1-50)
            DEPLOY_PATH="preview/pr-${PR_NUMBER}-${SANITIZED_BRANCH}"
            BASE_PATH="/nomad/${DEPLOY_PATH}"

            echo "deploy_path=${DEPLOY_PATH}" >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/${DEPLOY_PATH}/" >> $GITHUB_OUTPUT
            echo "base_path=${BASE_PATH}" >> $GITHUB_OUTPUT
            echo "is_preview=true" >> $GITHUB_OUTPUT
            echo "📍 Deploying PR preview to: /${DEPLOY_PATH}"
            echo "📍 BASE_PATH: ${BASE_PATH}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Production deployment
            echo "deploy_path=." >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_OUTPUT
            echo "base_path=/nomad" >> $GITHUB_OUTPUT
            echo "is_preview=false" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: ROOT (production)"
          else
            # Develop deployment
            echo "deploy_path=develop" >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/develop/" >> $GITHUB_OUTPUT
            echo "base_path=/nomad/develop" >> $GITHUB_OUTPUT
            echo "is_preview=false" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: /develop (staging)"
          fi

      - name: Generate test dashboard
        working-directory: ./apps/web
        run: |
          echo "📊 Generating dashboard..."
          echo "Using BASE_PATH: $BASE_PATH"
          echo "Using BRANCH_NAME: $BRANCH_NAME"
          node scripts/generate-dashboard.js
          echo "✅ Dashboard generated successfully"
          echo "=== Final public directory structure ==="
          ls -la public/
          echo "=== Storybook files ==="
          ls -la public/storybook/ | head -10
          echo "=== Playwright report files ==="
          ls -la public/playwright-report/ | head -10
          echo "=== Coverage files ==="
          ls -la public/coverage/ | head -10
        env:
          BASE_PATH: ${{ steps.set-path.outputs.base_path }}
          BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Deploy to GitHub Pages
        # Here we use peaceiris/actions-gh-pages because official actions/deploy-pages and actions/configure-pages does not support setting custom destination_dir which we need for our branch-specific deployment.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/public
          destination_dir: ${{ steps.set-path.outputs.deploy_path }}
          keep_files: true # Keep other files to avoid overwriting
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: ${{ github.event.head_commit.message }}

      - name: Set URL output
        id: set-url
        run: |
          echo "page_url=${{ steps.set-path.outputs.page_url }}" >> $GITHUB_OUTPUT

      - name: Deployment notification
        if: success()
        run: |
          echo "🎉 Successfully deployed!"
          echo "📍 URL: ${{ steps.set-path.outputs.page_url }}"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "🔍 Type: PR Preview"
            echo "🌿 PR: #${{ github.event.pull_request.number }}"
            echo "🌿 Branch: ${{ github.head_ref }}"
          else
            echo "🔍 Type: Branch Deployment"
            echo "🌿 Branch: ${{ github.ref_name }}"
          fi

  # ========================================
  # Comment on PR
  # ========================================

  comment-pr:
    name: Comment on PR
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs: [vitest-tests, merge-playwright-reports, storybook, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.base_ref }}" == "main" ]; then
            echo "env_name=Production" >> $GITHUB_OUTPUT
            echo "will_deploy=true" >> $GITHUB_OUTPUT
            echo "deploy_url=https://ukesjtu.github.io/nomad/" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" == "develop" ]; then
            echo "env_name=Development (Staging)" >> $GITHUB_OUTPUT
            echo "will_deploy=true" >> $GITHUB_OUTPUT
            echo "deploy_url=https://ukesjtu.github.io/nomad/develop/" >> $GITHUB_OUTPUT
          else
            echo "env_name=Unknown" >> $GITHUB_OUTPUT
            echo "will_deploy=false" >> $GITHUB_OUTPUT
            echo "deploy_url=N/A" >> $GITHUB_OUTPUT
          fi

      - name: Build preview message
        id: preview-msg
        if: needs.deploy.outputs.is_preview == 'true'
        run: |
          cat << 'EOF' >> $GITHUB_OUTPUT
          preview_section<<PREVIEW_EOF
          ### **🚀 Live Preview**

          ✨ **[View Preview Deployment](${{ needs.deploy.outputs.page_url }})** ✨

          This preview includes:
          - 📚 [Storybook](${{ needs.deploy.outputs.page_url }}storybook/) - Component library
          - 🎭 [E2E Test Report](${{ needs.deploy.outputs.page_url }}playwright-report/) - Playwright results
          - 📈 [Coverage Report](${{ needs.deploy.outputs.page_url }}coverage/) - Unit test coverage
          - 📊 [Test Dashboard](${{ needs.deploy.outputs.page_url }}) - Overview of all reports

          PREVIEW_EOF
          EOF

      - name: Comment PR with artifact links
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## 📊 Test Reports & Artifacts

            All tests have been completed! Test reports are available as workflow artifacts.

            ${{ steps.preview-msg.outputs.preview_section }}

            ### **Download Artifacts**
            - 📚 **[Storybook Build](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Component library documentation
            - 🎭 **[Playwright E2E Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - End-to-end test results
            - 📈 **[Unit Test Coverage](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Code coverage report

            ### **Test Status**
            - ✅ **Build Check**: Passed
            - ✅ **Vitest Tests**: Passed (Unit + Integration + Storybook)
            - ✅ **E2E Tests**: Passed
            - ✅ **Storybook**: Built successfully

            ### **Deployment Info**
            - **Target Branch**: `${{ github.base_ref }}`
            - **Environment**: ${{ steps.env.outputs.env_name }}
            ${{ needs.deploy.outputs.is_preview == 'true' && format('- **Preview URL**: {0}', needs.deploy.outputs.page_url) || '' }}
            - **Will Deploy**: ${{ steps.env.outputs.will_deploy == 'true' && '✅ Yes (after merge)' || '❌ No (artifacts only)' }}
            ${{ steps.env.outputs.will_deploy == 'true' && format('- **Deployment URL**: {0}', steps.env.outputs.deploy_url) || '' }}

            ### **Quick Stats**
            - **Workflow Run**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Commit**: [`${{ github.event.pull_request.head.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})
            - **Source Branch**: `${{ github.head_ref }}`

            ---

            ${{ needs.deploy.outputs.is_preview == 'true' && '🎉 **Preview deployment is live! Click the link above to review your changes.**' || (steps.env.outputs.will_deploy == 'true' && format('🚀 **This PR will deploy to {0} after merging to {1}**', steps.env.outputs.env_name, github.base_ref) || '📦 **Artifacts are ready for review. No deployment will occur.**') }}
