name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [develop, main]
    paths:
      - "content/slides/**"
      - ".github/workflows/deploy-slidev.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slidev-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Slidev
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Slidev CLI
        run: pnpm add -g @slidev/cli

      - name: Build Slidev
        run: slidev build content/slides/midterm-2.md --base /nomad/slides/
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: slidev-dist
          path: dist/
          retention-days: 30

      - name: Build status
        if: success()
        run: echo "✅ Slidev built successfully!"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: slidev-dist
          path: ./slidev-dist

      - name: Set deployment URL
        id: set-url
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "deploy_path=slides" >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/slides/" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: /slides/ (production)"
          else
            echo "deploy_path=slides/develop" >> $GITHUB_OUTPUT
            echo "page_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/slides/develop/" >> $GITHUB_OUTPUT
            echo "📍 Deploying to: /slides/develop/ (staging)"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./slidev-dist
          destination_dir: ${{ steps.set-url.outputs.deploy_path }}
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Slidev from ${{ github.ref_name }} - ${{ github.event.head_commit.message }}"

      - name: Deployment notification
        if: success()
        run: |
          echo "🎉 Slidev deployed successfully!"
          echo "📍 URL: ${{ steps.set-url.outputs.page_url }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
