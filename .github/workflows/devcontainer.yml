name: DevContainer Validation

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.devcontainer/**'
      - '.gitattributes'
  push:
    branches:
      - main
      - develop
    paths:
      - '.devcontainer/**'
      - '.gitattributes'
  workflow_dispatch:

jobs:
  validate-devcontainer:
    name: Validate DevContainer Configuration
    runs-on: ubuntu-latest

    # GitHub Actions automatically sets CI=true, which triggers lightweight
    # setup in postCreateCommand.sh. All heavy operations are explicitly
    # defined in the runCmd below for better visibility and control.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and run DevContainer
        uses: devcontainers/ci@v0.3
        with:
          # ====================================================================
          # DevContainer Validation Steps
          # ====================================================================
          # Since CI=true is set automatically by GitHub Actions, the
          # postCreateCommand only installs dependencies. All other validation
          # steps are explicitly defined here to:
          #   1. Provide clear visibility of what's being tested
          #   2. Get detailed logs for each validation step
          #   3. Avoid timeout issues during container initialization
          #   4. Allow fine-grained control over test execution order
          # ====================================================================
          runCmd: |
            echo "==================================================================="
            echo "Starting DevContainer Validation"
            echo "==================================================================="

            # Verify environment
            echo ""
            echo "[1/7] Checking development environment..."
            echo "Node.js version: $(node --version)"
            echo "pnpm version: $(pnpm --version)"

            # Verify database connection
            echo ""
            echo "[2/7] Checking PostgreSQL connection..."
            pg_isready -h postgres -U nomad -d nomad_dev || exit 1
            echo "✓ Database connection successful"

            # Install dependencies
            # Note: In CI mode, postCreateCommand is skipped to avoid timeout issues.
            # We install dependencies here for better control and visibility.
            echo ""
            echo "[3/7] Installing project dependencies..."
            pnpm install --frozen-lockfile || exit 1
            echo "✓ Dependencies installed"

            # Verify installation
            echo ""
            echo "[4/7] Verifying dependencies installation..."
            test -d node_modules || exit 1
            echo "✓ node_modules directory exists"

            # Initialize database schema
            echo ""
            echo "[5/7] Initializing database schema..."
            cd /workspace/apps/web
            pnpm drizzle-kit push --force || exit 1
            echo "✓ Database schema initialized"

            # Run TypeScript type checking
            echo ""
            echo "[6/7] Running TypeScript type check..."
            cd /workspace
            pnpm type-check || exit 1
            echo "✓ Type checking passed"

            # Run unit tests
            echo ""
            echo "[7/7] Running unit tests..."
            cd /workspace/apps/web
            pnpm test:unit --run || exit 1
            echo "✓ Unit tests passed"

            echo ""
            echo "==================================================================="
            echo "✓ DevContainer validation completed successfully!"
            echo "==================================================================="

      - name: Summary
        if: success()
        run: echo "DevContainer configuration is valid and working correctly"
