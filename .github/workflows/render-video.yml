name: Render Remotion Videos

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/demo/**"
      - ".github/workflows/render-video.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/demo/**"
  workflow_dispatch:
    inputs:
      composition_id:
        description: "Composition ID to render (leave empty for all)"
        required: false
        type: string
        default: "BusinessShowcase"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "render-video-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  render:
    name: Render Video - ${{ matrix.composition }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        composition:
          - BusinessShowcase
          - IntroScene
          - AuthSceneComplete
          - SearchScene
          - OrderScene
          - HomeScene

    steps:
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Render video
        working-directory: ./apps/demo
        run: |
          mkdir -p out
          pnpm render ${{ matrix.composition }} out/${{ matrix.composition }}.mp4
        env:
          REMOTION_CONCURRENCY: 2

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.composition }}
          path: apps/demo/out/${{ matrix.composition }}.mp4
          retention-days: 30

      - name: Get video info
        working-directory: ./apps/demo
        run: |
          if [ -f "out/${{ matrix.composition }}.mp4" ]; then
            echo "✅ Video rendered successfully: ${{ matrix.composition }}.mp4"
            ls -lh out/${{ matrix.composition }}.mp4
          else
            echo "❌ Video rendering failed"
            exit 1
          fi

  comment-pr:
    name: Comment on PR with video links
    if: github.event_name == 'pull_request'
    needs: [render]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Comment PR with video artifacts
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: video-render
          message: |
            ## 🎬 Remotion Video Rendering Complete

            All videos have been rendered successfully! Download them from the workflow artifacts.

            ### 📹 Available Videos
            - 🎥 **[BusinessShowcase](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Complete business flow (128s)
            - 🎬 **[IntroScene](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Brand intro (3s)
            - 🔐 **[AuthSceneComplete](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Authentication flow (25s)
            - 🔍 **[SearchScene](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Flight search (30s)
            - 📝 **[OrderScene](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - Booking process (40s)
            - 🏠 **[HomeScene](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** - User profile (30s)

            ### 📊 Workflow Info
            - **Workflow Run**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Commit**: [`${{ github.event.pull_request.head.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})
            - **Source Branch**: `${{ github.head_ref }}`

            ---

            💡 **Tip**: Videos are stored as workflow artifacts for 30 days. Click the links above to download them.
